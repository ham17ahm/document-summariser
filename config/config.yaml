# Compatibility copy of config/master_config.yaml.
# Prefer editing config/master_config.yaml for repository runs.

language:
  summary_language: ur

ocr:
  provider: google_cloud_vision
  language_hints: [ur, en]
  page_image_dpi: 300
  low_confidence_threshold: 0.8

pipeline:
  correction_provider: gemini
  summarisers: [chatgpt, gemini, grok, deepseek]
  consolidator: claude
  min_summaries: 4

providers:
  chatgpt:
    type: openai
    model: gpt-5.2
    api_key_env: OPENAI_API_KEY
    max_output_tokens: 4096
  gemini:
    type: gemini
    model: gemini-2.5-pro
    api_key_env: GEMINI_API_KEY
    max_output_tokens: 16384
    thinking_config:
      thinking_budget: 1024
  grok:
    type: grok
    model: grok-4.3
    api_key_env: XAI_API_KEY
    base_url: https://api.x.ai/v1
    max_output_tokens: 4096
  deepseek:
    type: deepseek
    model: deepseek-v4-pro
    api_key_env: DEEPSEEK_API_KEY
    base_url: https://api.deepseek.com
    max_output_tokens: 4096
  claude:
    type: anthropic
    model: claude-opus-4-7
    api_key_env: ANTHROPIC_API_KEY
    max_output_tokens: 64000
    thinking:
      type: adaptive
      display: omitted
    output_config:
      effort: xhigh

prompts:
  correction: prompts/correction.prompt.txt
  summarise: prompts/summarise.prompt.txt
  consolidate: prompts/consolidate.prompt.txt

output:
  format_spec: templates/output_format.yaml
  title: "Urdu Summary"
  font: "Noto Nastaliq Urdu"
  direction: rtl
  destination: ./runs/

runtime:
  concurrency: 4
  request_timeout_seconds: 120
  retries: 3
  retry_initial_delay_seconds: 1
